<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой простой сайт</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Добро пожаловать!</h1>
        <nav>
            <ul>
                <li><a href="#home">Главная</a></li>
                <li><a href="#about">О нас</a></li>
                <li><a href="#contact">Контакты</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="home">
            <h2>Главная страница</h2>
            <p>Это пример простого сайта на HTML, CSS и JavaScript.</p>
            <button id="greetButton">Поздороваться</button>
            <p id="greeting"></p>
        </section>

        <section id="about">
            <h2>О нас</h2>
            <p>Мы создаем простые и красивые веб-сайты.</p>
        </section>

        <section id="contact">
            <h2>Контакты</h2>
            <form id="contactForm">
                <input type="text" id="name" placeholder="Ваше имя" required>
                <input type="email" id="email" placeholder="Ваш email" required>
                <textarea id="message" placeholder="Ваше сообщение" required></textarea>
                <button type="submit">Отправить</button>
            </form>
            <p id="formMessage"></p>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Мой простой сайт</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
